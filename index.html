<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juguemos un rato</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
    body {
        background: linear-gradient(135deg, #ff4d9e 0%, #ff6bc4 25%, #ff8dd1 50%, #ff6bc4 75%, #ff4d9e 100%);
        background-size: 200% 200%;
        animation: gradientMove 8s ease infinite;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
    }
    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
  .card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
        border-radius: 28px;
        width: 100%;
        max-width: 390px;
        padding: 34px 26px;
        box-shadow: 0 30px 70px rgba(255, 77, 158, 0.45);
        text-align: center;
        border: 2px solid rgba(255, 107, 196, 0.3);
    }
  .title {
        background: linear-gradient(135deg, #ff1493, #c71585, #ff69b4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 29px;
        font-weight: 800;
        margin-bottom: 8px;
    }
  .subtitle { color: #d63384; font-size: 15px; margin-bottom: 25px; font-weight: 600; }
  .question {
        font-size: 18px;
        color: #2d1b2e;
        margin: 20px 0 25px;
        min-height: 60px;
        line-height: 1.6;
        display: none;
        text-align: left;
        background: linear-gradient(135deg, #fff0f7, #ffe4f1);
        padding: 18px 20px;
        border-radius: 20px;
        border-left: 5px solid #ff1493;
    }
  .choices { display: flex; gap: 12px; justify-content: center; }
  .choices button {
        flex: 1;
        padding: 16px;
        border: none;
        border-radius: 18px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        color: white;
        transition: transform 0.2s;
    }
  .choices button:active { transform: scale(0.95); }
  .btn-verdad { background: linear-gradient(135deg, #ff1493, #ff69b4); }
  .btn-reto { background: linear-gradient(135deg, #c71585, #db7093); }
  .input-bar {
        display: none;
        margin-top: 18px;
        gap: 8px;
        align-items: center;
    }
  .input-bar input[type="text"] {
        flex: 1;
        border: 2px solid #ffb6d9;
        background: #fff;
        padding: 14px 16px;
        border-radius: 18px;
        outline: none;
        font-size: 15px;
    }
  .input-bar input:focus { border-color: #ff1493; }
  .input-bar button {
        border: none;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 20px;
        cursor: pointer;
        flex-shrink: 0;
    }
  .btn-cam { background: linear-gradient(135deg, #c71585, #db7093); }
  .btn-mic { background: linear-gradient(135deg, #c71585, #db7093); }
  .btn-mic.recording { background: #ff1744; animation: pulse 1s infinite; }
  .btn-send { background: linear-gradient(135deg, #ff1493, #ff69b4); }
    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
    }
    input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="title">Juguemos un rato</div>
  <div class="subtitle">Verdad o Reto 💖</div>

  <div class="question" id="question"></div>

  <div class="choices" id="choices">
    <button class="btn-verdad" onclick="getQuestion('verdad')">Verdad</button>
    <button class="btn-reto" onclick="getQuestion('reto')">Reto</button>
  </div>

  <div class="input-bar" id="inputBar">
    <button class="btn-cam" onclick="document.getElementById('foto').click()">📷</button>
    <input type="file" id="foto" accept="image/*" capture="environment">

    <input type="text" id="respuesta" placeholder="Escribe tu respuesta" oninput="toggleSend()">

    <button class="btn-mic" id="btnMic" onclick="toggleRecord()">🎤</button>

    <button class="btn-send" id="btnSend" onclick="enviar()" style="display:none">➤</button>
  </div>
</div>

<script>
const juego = {
  verdad: [
    "¿Qué detalle pequeño hace que alguien te guste más?",
    "¿Cuál fue el último mensaje que te hizo sonreír?",
    "¿Qué tipo de cumplido nunca falla contigo?",
    "¿Qué te da mariposas en el estómago cuando te lo dicen?",
    "¿Qué canción te recuerda a alguien especial?"
  ],
  reto: [
    "Mándame un audio diciendo mi nombre",
    "Tómate una selfie con tu mejor sonrisa",
    "Mándame una foto de algo rosa que veas ahora",
    "Escribe una frase coqueta de 8 palabras",
    "Mándame un emoji que usarías para coquetear"
  ]
};

let usadas = { verdad: [], reto: [] };
let preguntaActual = "";
let mediaRecorder, audioChunks = [], isRecording = false;
let fotoFile = null, audioFile = null;
const numero = "51912386464"; // 51 = código de Perú

function getQuestion(tipo) {
  let pool = juego;
  let usadasTipo = usadas;

  let disponibles = pool.filter(q =>!usadasTipo.includes(q));

  if (disponibles.length === 0) {
    usadas = [];
    disponibles = pool;
  }

  preguntaActual = disponibles[Math.floor(Math.random() * disponibles.length)];
  usadasTipo.push(preguntaActual);

  document.getElementById('question').innerText = preguntaActual;
  document.getElementById('question').style.display = 'block';
  document.getElementById('choices').style.display = 'none';
  document.getElementById('inputBar').style.display = 'flex';
}

function toggleSend() {
  const texto = document.getElementById('respuesta').value.trim();
  const tieneArchivo = fotoFile!== null || audioFile!== null;
  document.getElementById('btnSend').style.display = (texto || tieneArchivo)? 'flex' : 'none';
}

async function toggleRecord() {
  const btnMic = document.getElementById('btnMic');

  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      audioFile = null;

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        audioFile = new File(, "audio.webm", { type: "audio/webm" });
        document.getElementById('respuesta').value = "Audio listo";
        toggleSend();
        stream.getTracks().forEach(track => track.stop());
      };

      mediaRecorder.start();
      isRecording = true;
      btnMic.classList.add('recording');

      setTimeout(() => {
        if (isRecording) {
          mediaRecorder.stop();
          isRecording = false;
          btnMic.classList.remove('recording');
        }
      }, 5000);

    } catch(e) {
      alert('Activa el permiso del micrófono en tu navegador');
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btnMic.classList.remove('recording');
  }
}

document.getElementById('foto').addEventListener('change', function() {
  if (this.files.length > 0) {
    fotoFile = this.files[0];
    document.getElementById('respuesta').value = "Foto lista";
    toggleSend();
  }
});

function enviar() {
  const texto = document.getElementById('respuesta').value.trim();
  const mensaje = `Pregunta: ${preguntaActual}\nRespuesta: ${texto}`;
  const archivos = [];

  if (fotoFile) archivos.push(fotoFile);
  if (audioFile) archivos.push(audioFile);

  if (navigator.share && archivos.length > 0 && navigator.canShare({ files: archivos })) {
    navigator.share({
      text: mensaje,
      files: archivos
    }).catch(() => {});
  } else {
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
  }

  document.getElementById('respuesta').value = "";
  document.getElementById('foto').value = "";
  fotoFile = null;
  audioFile = null;
  document.getElementById('inputBar').style.display = 'none';
  document.getElementById('question').style.display = 'none';
  document.getElementById('choices').style.display = 'flex';
  document.getElementById('btnSend').style.display = 'none';
}
</script>
</body>
</html>
